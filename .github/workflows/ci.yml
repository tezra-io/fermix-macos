name: ci

# PR + main gates. Proves the pet builds universal2 (arm64 + x86_64) and the
# static runtime-policy / build-harness checks pass, on every change — BEFORE any
# signed release. No secrets: signing/notarization live in release-fermixpet.yml.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pet:
    name: FermixPet (build + verify)
    runs-on: macos-14
    defaults:
      run:
        working-directory: Apps/FermixPet
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep (runtime_policy_test.sh dependency)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install ripgrep

      - name: Static runtime-policy + build-harness tests
        run: |
          script/runtime_policy_test.sh
          script/build_and_run_test.sh

      - name: Entitlements lint
        run: plutil -lint Sources/FermixPet/FermixPet.entitlements

      # Runs the exact release build + stage + inside-out sign, but ad-hoc
      # (no secrets), so a universal2 build failure, a bundle-layout regression,
      # or a broken signing structure fails here — in ungated CI — instead of
      # only when a signed release tag is pushed. Only real notarization (Apple
      # round-trip) is left to release-fermixpet.yml.
      - name: Build + stage + adhoc-sign (universal2 / layout / signing gate)
        working-directory: ${{ github.workspace }}
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          scripts/stage_app.sh "0.0.0-ci" "$RUN_NUMBER" "$RUNNER_TEMP/FermixPet-ci.app"
          scripts/sign_app.sh "$RUNNER_TEMP/FermixPet-ci.app" "-"

      # Render the cask with placeholder version/sha and lint it exactly as the
      # release job does, so a cask-template style regression fails here in
      # ungated CI instead of after a full sign+notarize on a release tag.
      - name: Cask style-check
        working-directory: ${{ github.workspace }}
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          sha="$(printf '%064d' 0)"
          sed -e "s/__VERSION__/0.0.0/g" -e "s/__SHA256__/$sha/g" \
            Casks/fermixpet.rb.tmpl > Casks/fermixpet.rb
          brew style Casks/fermixpet.rb
          rm -f Casks/fermixpet.rb

  contract:
    name: realtime wire contract (checksum pin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/verify_protocol_contract.sh
